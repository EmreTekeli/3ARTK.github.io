name: Android APK Build

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-apk:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Web uygulamasını derle
        run: |
          npm ci
          npm run build

      - uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Capacitor Android sync
        run: npx cap sync android

      - name: APK derle (debug)
        working-directory: android
        run: ./gradlew assembleDebug --no-daemon

      - name: APK yükle (artifact)
        uses: actions/upload-artifact@v4
        with:
          name: SlopeFixRTK-debug
          path: android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30

      - name: Release oluştur
        uses: softprops/action-gh-release@v2
        with:
          tag_name: apk-${{ github.run_number }}
          name: "SlopeFix RTK v${{ github.run_number }}"
          body: "Android APK — Bluetooth SPP ile RTK cihazına bağlanmak için telefonuna yükle."
          files: android/app/build/outputs/apk/debug/app-debug.apk
          make_latest: true
